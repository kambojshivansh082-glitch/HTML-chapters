<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists-Html Tutorial</title>
</head>
<body>
    <h1>Lists in HTML</h1>
    <h2>Types of Lists</h2>
    <ol>
        <li>Ordered List</li>
        <li>Unordered List</li>
        <li>Definition List</li>
    </ol>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
    <h2>Definition List</h2>
    <dl>
        <dt>HTML</dt>
        <dd>Language for creating web pages.</dd>
        <dt>CSS</dt>
        <dd>Cascading Style Sheets for web page design.</dd>
        <dt>JavaScript</dt>
        <dd>Programming language for web page interactivity.</dd>
    </dl>
</body>
</html>
